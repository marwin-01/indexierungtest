<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #07111f; }
        .accent { fill: #74d7ff; }
        .accent2 { fill: #8dffa8; }
      }
      @media (prefers-color-scheme: light) {
        .bg { fill: #ffffff; }
        .accent { fill: #0066cc; }
        .accent2 { fill: #00aa44; }
      }
    </style>
  </defs>
  <!-- Hintergrund -->
  <rect width="64" height="64" class="bg" rx="12"/>
  <!-- Indexierungs-Symbol: Vergrößerungsglas mit Lupe -->
  <circle cx="28" cy="28" r="16" fill="none" stroke="#74d7ff" stroke-width="3"/>
  <line x1="41" y1="41" x2="53" y2="53" stroke="#74d7ff" stroke-width="3" stroke-linecap="round"/>
</svg>